name: Build and Deploy Widget (CDN)

on:
  push:
    branches:
      - main
    paths:
      - 'packages/widget/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Widget
        run: npm run build --workspace=packages/widget

      # Aquí iría el paso para subir el archivo 'packages/widget/dist/widget.iife.js'
      # al bucket de AWS S3 o Cloudflare R2 / Vercel Edge para ser servido en el CDN.
